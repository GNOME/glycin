annotations:
  experimental: Support for this format is still experimental the corresponding loader is not built by default
  lgpl: The loader for this format depends on LGPL-3.0-or-later licenced software
  gpl: The loader for this format depends on GPL-3.0-or-later licenced software

formats:
  image/jpeg:
    icc: true
    cicp: unsupported
    exif: true
    xmp: true
    animation: unsupported
    loader-codec: zune-jpeg

  image/heif:
    icc: true
    cicp: true
    exif: true
    xmp: false
    animation: true
    loader-codec:
      name: libheif
      url: https://github.com/strukturag/libheif
      lang: C++

  image/avif:
    icc: true
    cicp: true
    exif: true
    xmp: false
    animation: true
    loader-codec:
      name: libheif
      url: https://github.com/strukturag/libheif
      lang: C++

  image/jxl:
    icc: true
    cicp: true
    exif: true
    xmp: false
    animation: false
    loader-codec:
      name: libjxl
      url: https://github.com/libjxl/libjxl
      lang: C++
    annotations: [gpl]

  image/png:
    icc: true
    cicp: true
    exif: true
    xmp: true
    animation: unsupported
    loader-codec: png

  image/apng:
    icc: true
